<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moe Kyaw Aung — Senior Android Developer</title>
    <meta name="description" content="Senior Android Developer specializing in Kotlin, Jetpack Compose, and Clean Architecture. Building performant mobile applications.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Moe Kyaw Aung — Senior Android Developer">
    <meta property="og:description" content="Android Developer specializing in Kotlin and Jetpack Compose">
    <meta property="og:type" content="website">
    
    <!-- Preconnect to fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0D0D0D;
            color: #F5F5F5;
            overflow-x: hidden;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0D0D0D;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #C9A84C;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #ComposeTarget {
            width: 100%;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
    </div>
    <canvas id="ComposeTarget"></canvas>
    <script src="portfolio.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        });
    </script>
</body>
</html>
